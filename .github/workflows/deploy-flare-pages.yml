      - name: Verify public env presence
        run: |
          test -n "$EXPO_PUBLIC_FLARE_SUPABASE_URL"
          test -n "$EXPO_PUBLIC_FLARE_SUPABASE_ANON_KEY"
          test -n "$EXPO_PUBLIC_FLARE_AUTH_REDIRECT_URL"
          test -n "$EXPO_PUBLIC_FLARE_API_BASE_URL"
          echo "Flare public env vars are present"
        env:
          EXPO_PUBLIC_FLARE_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_FLARE_SUPABASE_URL }}
          EXPO_PUBLIC_FLARE_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_FLARE_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_FLARE_AUTH_REDIRECT_URL: ${{ vars.EXPO_PUBLIC_FLARE_AUTH_REDIRECT_URL }}
          EXPO_PUBLIC_FLARE_API_BASE_URL: ${{ vars.EXPO_PUBLIC_FLARE_API_BASE_URL }}

      - name: Export web build
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FLARE_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_FLARE_SUPABASE_URL }}
          EXPO_PUBLIC_FLARE_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_FLARE_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_FLARE_AUTH_REDIRECT_URL: ${{ vars.EXPO_PUBLIC_FLARE_AUTH_REDIRECT_URL }}
          EXPO_PUBLIC_FLARE_API_BASE_URL: ${{ vars.EXPO_PUBLIC_FLARE_API_BASE_URL }}